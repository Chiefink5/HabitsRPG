
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillForge V3</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
<div class="brand">⛏ SkillForge V3</div>
<div class="stats">
<span id="level">Lv 1</span>
<span id="coins">🪙 0</span>
</div>
</header>

<nav class="tabs">
<button data-tab="dashboard">Dashboard</button>
<button data-tab="skills">Skills</button>
<button data-tab="rewards">Rewards</button>
<button data-tab="quests">Quests</button>
<button data-tab="analytics">Analytics</button>
</nav>

<main>
<section id="dashboard" class="tab active"></section>
<section id="skills" class="tab"></section>
<section id="rewards" class="tab"></section>
<section id="quests" class="tab"></section>
<section id="analytics" class="tab"></section>
</main>

<script src="script.js"></script>
</body>
</html>
