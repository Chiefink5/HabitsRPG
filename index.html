<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillForge V5</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="theme-overworld">
<div id="toastStack" class="toast-stack"></div>
<div id="modalBackdrop" class="modal-backdrop hidden"></div>
<div id="modalHost" class="modal-host hidden"></div>

<header class="topbar">
  <div class="brand-wrap">
    <div class="brand-icon">⛏</div>
    <div><div class="brand-title">SkillForge V5</div><div class="brand-sub">drastic theme layouts</div></div>
  </div>
  <div class="topbar-right">
    <button class="pill" id="levelPill">Lv 1</button>
    <button class="pill coin" id="coinPill">🪙 0</button>
    <button class="pill action" id="settingsBtn">Settings</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
  <button class="tab-btn" data-tab="skills">Skills</button>
  <button class="tab-btn" data-tab="rewards">Rewards</button>
  <button class="tab-btn" data-tab="quests">Quests</button>
  <button class="tab-btn" data-tab="analytics">Analytics</button>
</nav>

<main class="app-shell">
  <section id="dashboardTab" class="tab-panel active"></section>
  <section id="skillsTab" class="tab-panel"></section>
  <section id="rewardsTab" class="tab-panel"></section>
  <section id="questsTab" class="tab-panel"></section>
  <section id="analyticsTab" class="tab-panel"></section>
</main>
<script src="script.js"></script>
</body>
</html>
